name: Deploy Public Files & Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build NeoCEG docs
        run: cd NeoCEG && mkdocs build

      - name: Assemble site
        run: |
          mkdir -p _site/NeoCEG
          # NeoCEG MkDocs output
          cp -r NeoCEG/site/* _site/NeoCEG/
          # NeoCEG sample files
          if [ -d NeoCEG/Samples ]; then
            cp -r NeoCEG/Samples _site/NeoCEG/Samples
          fi
          # Root-level files (exclude dirs and hidden files)
          for f in $(find . -maxdepth 1 -type f ! -name '.*'); do
            cp "$f" _site/
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

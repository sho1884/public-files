site_name: NeoCEG Documentation
site_url: https://sho1884.github.io/public-files/NeoCEG/
repo_url: https://github.com/sho1884/NeoCEG
repo_name: sho1884/NeoCEG
docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - search.suggest
    - content.code.copy

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: index.md
  - User Manual: User_Manual.md
  - DSL Grammar (EBNF): DSL_Grammar_Specification.md

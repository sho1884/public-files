site_name: NeoCEG Documentation
site_url: https://sho1884.github.io/public-files/NeoCEG/
repo_url: https://github.com/sho1884/NeoCEG
repo_name: sho1884/NeoCEG
docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - User Manual: User_Manual.md
  - Requirements Specification: Requirements_Specification.md
  - DSL Grammar: DSL_Grammar_Specification.md
  - GUI Specification: GUI_Specification.md
  - Algorithm Design: Algorithm_Design.md
  - Security Design: Security_Design.md
  - Traceability: Traceability.md
  - Modernization Goals: Modernization_Goals_and_Design.md
  - CEGTest 1.6 Analysis: CEGTest_1.6_Feature_Analysis.md

    function: "Select elements"
    scenarios:
      - context: "Element exists"
        action: "User clicks"
        outcome: "Select that element"
      - context: "Element is selected"
        action: "User Ctrl+clicks"
        outcome: "Add to selection (multi-select)"
      - context: "On canvas"
        action: "User drag-selects area"
        outcome: "Select elements within area"
      - context: "Element is selected"
        action: "User presses Esc"
        outcome: "Deselect"

  SR-062:
    parent: [UR-002]
    category: operation_support
    function: "Zoom/pan canvas"
    scenarios:
      - context: "Canvas is displayed"
        action: "User scrolls mouse wheel"
        outcome: "Zoom in/out"
      - context: "Canvas is displayed"
        action: "User right-drags"
        outcome: "Pan (move) canvas"
      - context: "Any zoom state"
        action: "User clicks 'Fit all' button"

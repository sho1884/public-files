# =============================================================================
# Future Extensions (Candidates)
# =============================================================================
# These items are not currently in scope but may be implemented in future versions

future_extensions:
  FE-001:
    category: decision_table
    title: "Configurable column threshold for auto-switch"
    description: |
      Allow users to configure the threshold for auto-switching from Learning Mode
      to Practice Mode (currently fixed at 256 columns).
    rationale: "Different users may have different performance tolerance and educational needs"
    default_value: 256
    range: "64-1024"

  FE-002:
    category: decision_table
    title: "Preview column count before mode switch"
    description: |
      Show estimated column count before switching to Learning Mode when table is large.
      User can decide whether to proceed knowing the size.
    ui: "Confirmation dialog showing: 'Learning Mode will display N columns. Continue?'"

  FE-003:
    category: decision_table
    title: "Hybrid display mode"
    description: |
      Display only a subset of excluded columns in Learning Mode:
      - Show first N examples of each exclusion category
      - Provide expandable sections for full list
      - Balance educational value with usability
    rationale: "Full Learning Mode may be overwhelming for very large tables"

  FE-004:
    category: constraints
    title: "Constraint wizard for complex scenarios"
    description: |
      Guided UI for creating complex constraint combinations:
      - Suggest constraints based on node selection
      - Warn about potential contradictions before creation
      - Visualize constraint effects preview

  FE-005:
    category: import_export
    title: "Export with exclusion annotations"
    description: |
      Include exclusion reasons in CSV export:
      - Optional column for exclusion reason
      - Machine-readable format for test management tools
      - Support filtering by exclusion type during export

  FE-006:
    category: operation_support
    title: "GraphViz MCP integration for advanced layout"
    description: |
      Use GraphViz via MCP server for better hierarchical layout:
      - Dot layout for directed graphs
      - Minimize edge crossings
      - Support for constraint node positioning

  FE-007:

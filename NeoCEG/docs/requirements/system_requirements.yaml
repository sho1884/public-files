# =============================================================================
# Visual Rendering Specifications
# =============================================================================

rendering:
  nodes:
    shape: "rounded rectangle"
    default_width: 150
    min_width: 80
    max_width: 400
    width_adjustable: true  # User can resize with mouse drag on border
    text_wrap: true  # Auto-wrap long text within node width
    text_align: "left"
    font: "system default, monospace fallback"
    operator_badge:
      position: "left-center (inside node, left of label)"
      display: "AND or OR badge"
      visibility: "Only shown for nodes with incoming edges (intermediate/effect)"
      interaction: "Click to toggle AND/OR"
    colors:
      cause: { fill: "#e3f2fd", border: "#1976d2", text: "#000000" }
      intermediate: { fill: "#e8eaf6", border: "#3949ab", text: "#000000" }
      effect: { fill: "#f3e5f5", border: "#7b1fa2", text: "#000000" }
    monochrome:
      cause: { fill: "#ffffff", border: "#000000", pattern: "none" }
      intermediate: { fill: "#e0e0e0", border: "#000000", pattern: "none" }
      effect: { fill: "#c0c0c0", border: "#000000", pattern: "none" }

  edges:
    logical_relation:
      positive:
        color: "#333333"
        style: "solid"
        width: 2
        arrow: "filled"
      negative:  # NOT relation
        color: "#1976d2"  # Blue for negative logic
        style: "solid"
        width: 2
        arrow: "filled"
        label: "Not"  # Edge label for NOT (consistent with AND/OR labels)
    constraint_relation:
      positive:
        color: "#9e9e9e"  # Gray for constraints
        style: "dotted"
        width: 1
      negative:  # NOT on constraint member (e.g., EXCL(A, NOT B))
        color: "#64b5f6"  # Light blue for constraint negative
        style: "dotted"
        width: 1
        label: "Not"
    monochrome:
      logical_positive:
        color: "#000000"
        style: "solid"
        width: 2
      logical_negative:
        color: "#000000"
        style: "solid"
        width: 2
        label: "Not"
      constraint_positive:
        color: "#666666"
        style: "dotted"
        width: 1
      constraint_negative:
        color: "#666666"
        style: "dotted"
        width: 1
        label: "Not"

  constraints:
    # Constraints are represented as dedicated constraint nodes (not just labels on edges)
    # This provides better visual clarity and easier selection/editing
    representation: "constraint_node"
    node_shape: "rounded rectangle (smaller than regular nodes)"

    # All constraint types use unified gray color for cleaner visual appearance
    unified_color: "#757575"  # Gray for all constraint types

    ONE:
      color: "#757575"  # Unified gray
      style: "dotted"
      connector: "edges from constraint node to all member nodes"
      label: "One"
    EXCL:
      color: "#757575"  # Unified gray
      style: "dotted"
      connector: "edges from constraint node to all member nodes"
      label: "Excl"
    INCL:
      color: "#757575"  # Unified gray
      style: "dotted"
      connector: "edges from constraint node to all member nodes"
      label: "Incl"
    REQ:
      color: "#757575"  # Unified gray
      style: "dotted"
      connector: "incoming edge from source, outgoing edges to targets"
      label: "Req"
    MASK:
      color: "#757575"  # Unified gray
      style: "dotted"
      connector: "incoming edge from trigger, outgoing edges to targets"
      label: "Mask"

# =============================================================================
# Layout and Coordinates
# =============================================================================

layout:
  coordinate_handling:
    with_coordinates: "Place nodes at specified positions"
    without_coordinates: "Apply auto-layout (no error)"
    partial_coordinates: "Place specified nodes, auto-layout others"

  auto_layout:
    algorithm: "layered left-to-right"
    cause_position: "left side"
    effect_position: "right side"
    intermediate_position: "between causes and effects"
    minimum_spacing:
      horizontal: 100
      vertical: 50
    overlap_prevention: true
    future_enhancement: "GraphViz MCP integration for better layout"

  node_resize:
    method: "mouse drag on node border"
    preserve_aspect: false
    snap_to_grid: false

# =============================================================================
# 3.1 Graph Editing
# =============================================================================

requirements:
  SR-001:
    parent: [UR-002]
    category: graph_editing
    function: "Place node on canvas"
    scenarios:
      - context: "Canvas is displayed"
        action: "User clicks position and enters node name"
        outcome: "Node appears at that position"
      - context: "Node with same name exists"
        action: "User attempts to create node with that name"
        outcome: "Show error message, node is not created"
      - context: "Node name is empty"
        action: "User confirms"
        outcome: "Show error message, node is not created"

  SR-002:
    parent: [UR-002]
    category: graph_editing
    function: "Edit node properties"
    editable_properties:
      - "Node name (label) - Unicode allowed including Japanese propositions/predicates"
      - "Logical operator (AND/OR) - only valid for nodes with multiple inputs"
      - "Observable flag (default: ON) - whether node can be directly tested"
      - "Memo"
    display_properties:
      width:
        default: 150
        min: 80
        max: 400
        adjustable: "Mouse drag on node border"
      text_wrap:
        enabled: true
        note: "Newline input not allowed, but auto-wrap for display"
      observable_indicator:
        enabled: true
        visual: "Green circle badge at top-right corner"
        tooltip: "Observable - can be directly tested"
        default: true  # ON by default
    context_menu:
      set_label_to_expression:
        enabled: true
        condition: "Node has incoming edges (intermediate/effect)"
        behavior: "Set node label to logical expression with quoted source labels"
        example: '"入力A" AND "入力B"'
        note: "Labels are quoted to safely handle special characters in labels"
    note: "Node role (cause/intermediate/effect) is not editable - derived from graph structure"
    scenarios:
      - context: "Node exists"
        action: "User double-clicks node"
        outcome: "Start inline label editing"
      - context: "Node exists"
        action: "User right-clicks node"
        outcome: "Show context menu with options"
      - context: "Node has incoming edges"
        action: "User selects 'Set label to expression' from context menu"
        outcome: "Node label is set to logical expression (e.g., '\"A\" AND \"B\"')"
      - context: "Node is observable"
        action: "User selects 'Mark as Non-Observable' from context menu"
        outcome: "Node observable flag is set to OFF"
      - context: "Non-observable node exists"
        action: "User selects 'Mark as Observable' from context menu"
        outcome: "Node observable flag is set to ON"
      - context: "Editing properties"
        action: "User changes node name and confirms"
        outcome: "Node name is updated, related displays are updated"
      - context: "New name duplicates existing node"
        action: "User confirms"
        outcome: "Show error message, change is not applied"
      - context: "Node label is long"
        action: "Display node"
        outcome: "Auto-wrap text within node width"
      - context: "Node displayed"
        action: "User drags node border"
        outcome: "Resize node width, text re-wraps accordingly"

  SR-003:
    parent: [UR-002]
    category: graph_editing
    function: "Delete node"
    constraint_cascade_rules:
      minimum_nodes:
        ONE: 2
        EXCL: 2
        INCL: 2
        REQ: 2  # source + target
        MASK: 2  # trigger + at least 1 target
      behavior:
        - condition: "Constraint drops below minimum nodes"
          action: "Auto-delete constraint"
        - condition: "Constraint remains above minimum but membership changes"
          action: "Show warning listing affected constraints, update constraint on confirm"
    scenarios:
      - context: "Node is selected"
        action: "User presses Delete key"
        outcome: "Show confirmation dialog listing affected logical relations and constraints"
      - context: "Confirmation dialog is shown"
        action: "User selects OK"
        outcome: "Delete node, related logical relations, and cascade constraint updates"
      - context: "Confirmation dialog is shown"
        action: "User selects Cancel"
        outcome: "Node is not deleted"
      - context: "Confirmation dialog disabled in settings"
        action: "User presses Delete key"
        outcome: "Immediately delete node and cascade updates"
      - context: "Node is part of ONE/EXCL/INCL with 3+ nodes"
        action: "User deletes node"
        outcome: "Constraint is updated to exclude deleted node (e.g., ONE(A,B,C) -> ONE(A,B)), show notification"
      - context: "Node is part of constraint with exactly minimum nodes"
        action: "User deletes node"
        outcome: "Constraint is auto-deleted, show notification"
      - context: "Node is REQ/MASK trigger"
        action: "User deletes trigger node"
        outcome: "REQ/MASK constraint is auto-deleted"
      - context: "Node is MASK target (one of multiple)"
        action: "User deletes target node"
        outcome: "Target is removed from MASK set, constraint updated"

  SR-004:
    parent: [UR-002]
    category: graph_editing
    function: "Move node"
    scenarios:
      - context: "Node exists"
        action: "User drags node"
        outcome: "Node follows mouse position"
      - context: "During drag"
        action: "-"
        outcome: "Connection lines redraw in real-time"
      - context: "Multiple nodes selected"
        action: "User drags"
        outcome: "All selected nodes move simultaneously"

  SR-005:
    parent: [UR-002]
    category: graph_editing
    function: "Create logical relation"
    scenarios:
      - context: "Two or more nodes exist"
        action: "User drags from node handle to another node"
        outcome: "Create logical relation (edge)"
      - context: "Target node receives multiple inputs"
        action: "-"
        outcome: "Show operator selection UI (AND/OR)"
      - context: "Target is ancestor of source"
        action: "User attempts connection"
        outcome: "Show error message, prevent circular reference"

  SR-006:
    parent: [UR-002]
    category: graph_editing
    function: "Edit logical relation"
    scenarios:
      - context: "Edge exists"
        action: "User clicks edge"
        outcome: "Show edit menu"
      - context: "Edit menu shown"
        action: "User selects 'Toggle AND/OR'"
        outcome: "Switch logical operator"
      - context: "Edit menu shown"
        action: "User selects 'Toggle NOT'"
        outcome: "Toggle negation state, change line color to blue (#1976d2), add 'Not' label"

  SR-007:
    parent: [UR-002]
    category: graph_editing
    function: "Delete logical relation"
    scenarios:
      - context: "Edge is selected"
        action: "User presses Delete key"
        outcome: "Delete edge"

# =============================================================================
# 3.2 Constraints
# =============================================================================

  SR-010:
    parent: [UR-002]
    category: constraints
    function: "Create ONE constraint"
    definition: "Exactly one of multiple nodes must be true"
    scenarios:
      - context: "Two or more nodes selected"
        action: "User selects 'Add ONE constraint'"
        outcome: "Create ONE constraint among selected nodes, display visually"
      - context: "One or fewer nodes selected"
        action: "User selects 'Add ONE constraint'"
        outcome: "Show error message"

  SR-011:
    parent: [UR-002]
    category: constraints
    function: "Create EXCL constraint"
    definition: "Multiple nodes cannot be true simultaneously (all false is allowed)"
    scenarios:
      - context: "Two or more nodes selected"
        action: "User selects 'Add EXCL constraint'"
        outcome: "Create EXCL constraint among selected nodes"

  SR-012:
    parent: [UR-002]
    category: constraints
    function: "Create INCL constraint"
    definition: "At least one of multiple nodes must be true"
    scenarios:
      - context: "Two or more nodes selected"
        action: "User selects 'Add INCL constraint'"
        outcome: "Create INCL constraint among selected nodes"

  SR-013:
    parent: [UR-002]
    category: constraints
    function: "Create REQ constraint"
    definition: "If A is true then B must be true (A implies B)"
    scenarios:
      - context: "Source and target nodes specified"
        action: "User selects 'Add REQ constraint'"
        outcome: "Create REQ constraint from source to target"

  SR-014:
    parent: [UR-002]
    category: constraints
    function: "Create MASK constraint"
    definition: "When A is true, node set {B,C,...} becomes indeterminate (M)"
    scenarios:
      - context: "Source node and target node set specified"
        action: "User selects 'Add MASK constraint'"
        outcome: "Create MASK constraint from source to {target set}"

  SR-015:
    parent: [UR-002]
    category: constraints
    function: "Edit/delete constraint"
    scenarios:
      - context: "Constraint exists"
        action: "User clicks constraint"
        outcome: "Show edit menu"
      - context: "Edit menu shown"
        action: "User selects 'Delete'"
        outcome: "Delete constraint"
      - context: "Edit menu shown"
        action: "User selects 'Change type'"
        outcome: "Change constraint type"
      - context: "Constraint edge to member exists"
        action: "User clicks constraint edge"
        outcome: "Show edge edit menu"
      - context: "Constraint edge edit menu shown"
        action: "User selects 'Toggle NOT'"
        outcome: "Toggle negation on member reference, change edge color to light blue (#64b5f6), add 'Not' label"

  SR-016:
    parent: [UR-002, UR-003]
    category: constraints
    function: "Detect constraint contradiction"
    contradiction_patterns:
      - pattern: "ONE(A,B) + REQ(A->B)"
        reason: "ONE requires exactly one true, but REQ forces both true when A=T"
      - pattern: "ONE(A,B) + ONE(B,C) with 3 nodes"
        reason: "Two ONE constraints may require conflicting true nodes"
      - pattern: "EXCL(A,B) + INCL(A,B) on same pair"
        reason: "EXCL forbids both true, INCL forbids both false - forces XOR"
      - pattern: "REQ(A->B) + REQ(B->A) + EXCL(A,B)"
        reason: "REQ pair forces A=B, but EXCL forbids both true"
    scenarios:
      - context: "User creates or edits a constraint"
        action: "System checks constraint set"
        outcome: "If contradiction detected, show warning with conflicting constraints highlighted"
      - context: "Constraint contradiction exists"
        action: "User attempts to generate decision table"
        outcome: "Show error message identifying contradictory constraints, abort calculation"
      - context: "Contradiction warning shown"
        action: "User chooses to proceed anyway"
        outcome: "Allow editing to continue (user may fix later)"

# =============================================================================
# 3.3 Decision Table
# =============================================================================

  SR-020:
    parent: [UR-003]
    category: decision_table
    function: "Generate decision table"
    scenarios:
      - context: "Graph has logical relations"
        action: "Graph is edited"
        outcome: "Recalculate decision table and update display"
      - context: "Graph is empty"
        action: "-"
        outcome: "Hide decision table"
      - context: "Constraint contradiction detected (see SR-016)"
        action: "System attempts to generate table"
        outcome: "Show error with contradicting constraints, abort calculation"

  SR-021:
    parent: [UR-003]
    category: decision_table
    function: "Display table values"
    value_definitions:
      T: { meaning: "The node is true", color: "green" }
      t: { meaning: "Must logically be true (no matching combination in expressions)", color: "light green" }
      F: { meaning: "The node is false", color: "red" }
      f: { meaning: "Must logically be false (no matching combination in expressions)", color: "light red" }
      M: { meaning: "Truth value cannot be determined due to MASK constraint", color: "gray" }
      I: { meaning: "Truth value cannot be determined (cause-side node indeterminate)", color: "yellow" }

  SR-022:
    parent: [UR-005]
    category: decision_table
    function: "Switch display mode"
    display_modes:
      optimized: "Standard display excluding weak test conditions"
      full: "Complete version including deleted conditions (with deletion reason)"
    scenarios:
      - context: "Optimized display active"
        action: "User selects 'Full display'"
        outcome: "Show all test conditions with deletion reasons"
      - context: "Full display active"
        action: "User selects 'Optimized display'"
        outcome: "Hide weak test conditions"

  SR-023:
    parent: [UR-003]
    category: decision_table
    function: "Calculate indeterminate values correctly"
    background: "Bug fix for CEGTest 1.6"
    calculation_rules:
      # Logical operation rules (M = Masked/Don't Care)
      - { operation: "M AND M", result: "I", reason: "Both indeterminate, result indeterminate" }
      - { operation: "M OR M", result: "I", reason: "Both indeterminate, result indeterminate" }
      - { operation: "M AND T", result: "I", reason: "One indeterminate, result indeterminate" }
      - { operation: "M AND F", result: "F", reason: "F is certain, AND is F" }
      - { operation: "M OR T", result: "T", reason: "T is certain, OR is T" }
      - { operation: "M OR F", result: "I", reason: "One indeterminate, result indeterminate" }
      # NOT operation rules
      - { operation: "NOT T", result: "F", reason: "Inversion of true" }
      - { operation: "NOT F", result: "T", reason: "Inversion of false" }
      - { operation: "NOT M", result: "M", reason: "Inversion of masked is still masked" }
      - { operation: "NOT I", result: "I", reason: "Inversion of indeterminate is indeterminate" }
    constraint_not_evaluation:
      description: "NOT on constraint members inverts the node value before constraint logic"
      examples:
        - constraint: "EXCL(A, NOT B)"
          case: "A=T, B=T"
          evaluation: "effective values: A=T, NOT B=F → ∑=1 ≤ 1, constraint satisfied"
        - constraint: "EXCL(A, NOT B)"
          case: "A=T, B=F"
          evaluation: "effective values: A=T, NOT B=T → ∑=2 > 1, constraint VIOLATED"
        - constraint: "REQ(A -> NOT B)"
          case: "A=T, B=T"
          evaluation: "A=T requires NOT B=T (i.e., B=F), but B=T → constraint VIOLATED"
        - constraint: "ONE(A, NOT B)"
          case: "A=F, B=F"
          evaluation: "effective values: A=F, NOT B=T → ∑=1, constraint satisfied"
        - constraint: "MASK(NOT A -> {B})"
          case: "A=F"
          evaluation: "NOT A=T triggers mask, B becomes M"
      infeasibility_detection: "Constraints with NOT may create infeasible conditions (e.g., EXCL(A, NOT B) + REQ(A->B))"
    scenarios:
      - context: "Node is M due to MASK constraint"
        action: "Calculate decision table"
        outcome: "Calculate subsequent node values according to above rules"
      - context: "Node value is I"
        action: "Calculate subsequent nodes"
        outcome: "I propagates (cannot be determined)"
      - context: "Constraint has NOT member"
        action: "Evaluate constraint"
        outcome: "Invert NOT member value, then apply constraint logic"
      - context: "NOT member is M"
        action: "Evaluate constraint"
        outcome: "NOT M = M, constraint evaluation uses M for that member"

  SR-025:
    parent: [UR-003, UR-005]
    category: decision_table
    function: "Display mode selection (Learning/Practice)"
    description: "Switch between Learning Mode and Practice Mode for decision table display"
    modes:
      learning_mode:
        japanese: "学習モード"
        description: "Educational mode enumerating all 2^n cause combinations in binary counting order"
        behavior:
          - "Generate all 2^n cause combinations in systematic binary counting order"
          - "Evaluate each combination: propagate values, check constraints"
          - "Show exclusion reason for each excluded column (infeasible, redundant, untestable)"
          - "Exclusion explanations are beginner-friendly and concise"
        exclusion_types:
          infeasible: "Constraint violation (ONE, EXCL, INCL, REQ)"
          redundant: "Feasible but not needed for expression coverage"
          untestable: "Effect indeterminate (I) due to MASK propagation"
        truth_values: "Always uppercase T/F (no t/f distinction) — beginners see 'what would happen if tested' without expression-matching subtlety"
        purpose: "Help beginners understand which combinations are discarded and why"
      practice_mode:
        japanese: "実務モード"
        description: "Practical mode showing only necessary test conditions"
        behavior:
          - "Hide infeasible columns (constraint violations)"
          - "Hide weak columns (subsumed conditions)"
          - "Hide untestable columns (MASK indeterminate effects)"
          - "Display only actionable test conditions"
        purpose: "Efficient test case generation for practical use"
    ui_element:
      type: "toggle switch"
      location: "GUI toolbar or settings panel"
      label: "Learning Mode / Practice Mode"
      default: "Practice Mode"
      accessibility: "Always visible and switchable"
    scenarios:
      - context: "User opens application"
        action: "-"
        outcome: "Default to Practice Mode"
      - context: "Practice Mode active"
        action: "User clicks mode switch"
        outcome: "Switch to Learning Mode, generate and display all 2^n cause combinations"
      - context: "Learning Mode active"
        action: "User clicks mode switch"
        outcome: "Switch to Practice Mode, display optimized test conditions only"

  SR-026:
    parent: [UR-003, UR-005]
    category: decision_table
    function: "Auto-switch to Practice Mode on large tables"
    description: "Automatically switch to Practice Mode when decision table exceeds threshold"
    threshold: 256  # columns
    rationale: "Learning Mode with hundreds of columns becomes unusable and performance-heavy"
    scenarios:
      - context: "Graph edit causes decision table to exceed 256 columns"
        action: "System detects column count > 256"
        outcome: "Show notification message, auto-switch to Practice Mode"
      - context: "Notification message shown"
        action: "-"
        outcome: "Message: 'Decision table exceeds 256 columns. Switched to Practice Mode for performance.'"
      - context: "Auto-switched to Practice Mode"
        action: "User reduces graph complexity below threshold"
        outcome: "User can manually switch back to Learning Mode"
      - context: "In Practice Mode due to auto-switch"
        action: "User manually switches to Learning Mode"
        outcome: "Show warning if columns still exceed threshold, allow switch if confirmed"
    note: "Threshold value may be configurable in future versions (see future_extensions)"

  SR-024:
    parent: [UR-003, UR-004, UR-005]
    category: decision_table
    function: "Trace calculation result causes"
    traceability_info:
      - result: "I (Indeterminate)"
        info: "MASK constraint ID and propagation path"
      - result: "Infeasible (column deleted)"
        info: "Violated constraint ID (ONE/EXCL/INCL/REQ)"
      - result: "Untestable"
        info: "MASK constraint causing I in effect node"
      - result: "Weak test condition (column deleted)"
        info: "Subsuming condition number(s)"
    scenarios:
      - context: "Cell displays I, M, or deleted marker"
        action: "User hovers over cell"
        outcome: "Show tooltip with cause constraint ID and brief explanation"
      - context: "Cell is hovered showing constraint cause"
        action: "-"
        outcome: "Highlight related constraint in graph view"
      - context: "Full display mode active"
        action: "-"
        outcome: "Show deletion reason column with constraint IDs"
      - context: "Coverage table shows infeasible/untestable"
        action: "User hovers over marker"
        outcome: "Show tooltip identifying causal constraints"

# =============================================================================
# 3.4 Coverage Table
# =============================================================================

  SR-030:
    parent: [UR-004]
    category: coverage
    function: "Display coverage table"
    not_handling:
      description: "NOT on constraint members affects which conditions are infeasible/untestable"
      examples:
        - constraint: "EXCL(A, NOT B)"
          impact: "Conditions where A=T and B=F become infeasible (both effective values true)"
        - constraint: "REQ(A -> NOT B)"
          impact: "Conditions where A=T and B=T become infeasible"
        - constraint: "MASK(NOT A -> {B})"
          impact: "When A=F, conditions involving B become untestable (B=M→I propagation)"
      traceability: "Infeasible/untestable markers show constraint with NOT indication in tooltip"
    scenarios:
      - context: "Decision table is generated"
        action: "-"
        outcome: "Display coverage relationship between logical expressions and test conditions in table format"
      - context: "Logical expression is infeasible"
        action: "-"
        outcome: "Display '-' (hyphen) marker in red; show 'Infeasible' in remarks column"
      - context: "Logical expression is untestable"
        action: "-"
        outcome: "Display '?' (question) marker in amber; show 'MASK' in remarks column"
      - context: "Constraint with NOT member causes infeasibility"
        action: "-"
        outcome: "Tooltip shows constraint ID with NOT indication (e.g., 'EXCL(A, NOT B)')"
      - context: "MASK with NOT trigger causes untestability"
        action: "-"
        outcome: "Tooltip shows MASK constraint with NOT trigger indication"

# =============================================================================
# 3.5 Import/Export
# =============================================================================

  SR-040:
    parent: [UR-001, UR-006]
    category: import_export
    function: "Import DSL"
    file_format:
      extension: ".nceg"
      encoding: "UTF-8 (without BOM)"
      accepts: "LF or CRLF line endings"
    import_modes:
      replace: "Discard existing graph, create new from DSL"
      merge: "Add to existing graph, update duplicate nodes"
    error_classification:
      syntax_errors:
        - type: "Lexical error"
          example: "Invalid character or token"
          handling: "Show line number, abort import"
        - type: "Parse error"
          example: "auth := AND (incomplete expression)"
          handling: "Show line number and expected token, abort import"
      semantic_errors:
        - type: "Undefined reference"
          example: "result := undefined_node"
          handling: "List all undefined nodes, allow partial import or abort"
        - type: "Circular reference"
          example: "A := B; B := A"
          handling: "Show circular path, abort import"
        - type: "Self reference"
          example: "A := A AND B"
          handling: "Show self-referencing node, abort import"
        - type: "Constraint contradiction"
          example: "ONE(A,B) + REQ(A->B)"
          handling: "Show warning (SR-016), allow import with warning"
        - type: "Duplicate definition"
          example: "A := B; A := C (in same DSL)"
          handling: "Show duplicate, use last definition or abort"
    scenarios:
      - context: "DSL text is input, graph is empty"
        action: "User executes 'Import'"
        outcome: "Parse DSL and generate graph"
      - context: "DSL text is input, graph already exists"
        action: "User executes 'Import'"
        outcome: "Show mode selection dialog (Replace/Merge/Cancel)"
      - context: "Replace mode selected"
        action: "Import"
        outcome: "Discard existing graph, create new from DSL"
      - context: "Merge mode selected"
        action: "Import"
        outcome: "Add new nodes, update existing nodes with same name, merge constraints"
      - context: "Merge mode, node name conflict"
        action: "Import"
        outcome: "Update existing node properties, preserve coordinates unless DSL specifies"
      - context: "DSL contains coordinate information"
        action: "Import"
        outcome: "Place nodes at specified coordinates"
      - context: "DSL lacks coordinate information"
        action: "Import"
        outcome: "Apply auto-layout to place nodes (new nodes only in merge mode)"
      - context: "DSL has syntax error"
        action: "Import"
        outcome: "Show error message with line number and context, abort import"
      - context: "DSL has undefined node reference"
        action: "Import"
        outcome: "List undefined nodes, offer: create as new nodes / abort"
      - context: "DSL has circular reference"
        action: "Import"
        outcome: "Show circular path (e.g., A -> B -> C -> A), abort import"
      - context: "DSL has self reference"
        action: "Import"
        outcome: "Show self-referencing node, abort import"
      - context: "DSL has constraint contradiction"
        action: "Import"
        outcome: "Import with warning, highlight contradicting constraints (SR-016)"

  SR-043:
    parent: [UR-001, UR-006]
    category: import_export
    function: "Open from URL (?file= query parameter)"
    description: "Load a .nceg file from a URL on application startup"
    parameter: "?file=<HTTPS URL>"
    constraints:
      - "HTTPS only (HTTP rejected for security)"
      - "File host must allow CORS"
    scenarios:
      - context: "URL has ?file= parameter with valid HTTPS URL"
        action: "Application starts"
        outcome: "Fetch file, parse DSL, display graph"
      - context: "URL has ?file= parameter but fetch fails (network error, CORS, 404)"
        action: "Application starts"
        outcome: "Show error message, start with empty canvas"
      - context: "URL has ?file= parameter but file has syntax errors"
        action: "Application starts"
        outcome: "Show parse error, start with empty canvas"
      - context: "URL has ?file= parameter with HTTP (not HTTPS)"
        action: "Application starts"
        outcome: "Reject with security error, start with empty canvas"
      - context: "URL has no ?file= parameter"
        action: "Application starts"
        outcome: "Normal startup with empty canvas"

  SR-041:
    parent: [UR-006]
    category: import_export
    function: "Export DSL"
    file_format:
      extension: ".nceg"
      encoding: "UTF-8 (without BOM)"
      line_ending: "LF"
    dsl_features:
      observable_flag:
        syntax: 'nodename: "label" [observable]'
        note: "Observable is default ON, so non-observable nodes are marked with [!observable]"
      constraint_positions:
        syntax: "c0: (x, y)"
        note: "Constraint node positions stored in @layout section with c0, c1, c2... IDs"
        example: |
          @layout
          n1: (100, 100)
          n2: (200, 100)
          c0: (150, 50)
    scenarios:
      - context: "Graph exists"
        action: "User executes 'Export'"
        outcome: "Convert graph to DSL format"
      - context: "'Include coordinates' option is ON"
        action: "Export"
        outcome: "Include @layout section with node and constraint positions"
      - context: "'Include coordinates' option is OFF"
        action: "Export"
        outcome: "Output only logical relations and constraints"
      - context: "Node is marked non-observable"
        action: "Export"
        outcome: "Include [!observable] flag in node definition"
      - context: "Constraint nodes exist"
        action: "Export with coordinates"
        outcome: "Include constraint positions as c0, c1, etc. in @layout section"
      - context: "Export complete"
        action: "-"
        outcome: "Copy to clipboard or download as file"

  SR-042:
    parent: [UR-006]
    category: import_export
    function: "Export decision table"
    file_format:
      extension: ".csv"
      encoding: "UTF-8 (without BOM)"
      delimiter: ","
      line_ending: "CRLF (for Excel compatibility)"
    scenarios:
      - context: "Decision table exists"
        action: "User executes export"
        outcome: "Output in CSV format"
      - context: "Export in full display mode"
        action: "Export"
        outcome: "Include deleted test conditions in output"


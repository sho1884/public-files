# NeoCEG System Requirements
# Format: Verb + Object with rule scenarios
# Reference: Myers, Badgett, Sandler "The Art of Software Testing" 3rd Ed., Ch.4

version: "1.0"
last_updated: "2026-02-04"

# Change Log:
# v1.0 - Simplify node expression handling (SR-002)
#        - Remove auto-fill expression display (too complex with label special chars)
#        - Remove expression tooltip on hover
#        - Add "Set label to expression" context menu for intermediate/effect nodes
#        - Expression uses quoted labels: "A" AND "B" (safe for any label content)
# v0.9 - Add observable flag (default ON) for nodes (SR-002)
#        - Add constraint position storage in DSL layout section (SR-041)
# v0.8 - Add Learning Mode / Practice Mode for decision table display (SR-025, SR-026)
#        - Add terminology definitions for column exclusion reasons
#        - Add future extension candidates
# v0.7 - Unify constraint colors to gray (#757575) for cleaner visual appearance
#        - Change node text alignment from center to left
# v0.6 - Add undo/redo buttons with 50-entry history (SR-060)
#        - Specify operator badge position (left-center inside node)
#        - Update node width specification (default 150, min 80, max 400)
# v0.5 - Add NOT (negative logic) support for both logical relations and constraint members
#        - Logical NOT: blue (#1976d2), "Not" label
#        - Constraint NOT: light blue (#64b5f6), "Not" label
#        - Updated constraint definitions with NOT member examples
#        - Updated decision table calculation rules for constraint NOT evaluation

# =============================================================================
# Constraint Definitions (based on Myers)
# =============================================================================
# Myers uses symbols: E (Exclusive), I (Inclusive), O (One-and-only-one), R (Requires), M (Masks)
# NeoCEG uses keywords: EXCL, INCL, ONE, REQ, MASK

constraint_definitions:
  # All constraints support NOT (negative logic) on member references.
  # NOT inverts the truth value of the referenced node when evaluating the constraint.
  # Example: EXCL(A, NOT B) means "A and (NOT B) cannot both be true"
  #          which is equivalent to "A=T implies B=T" (since NOT B = F when B = T)

  negative_member_support:
    description: "Constraints can reference nodes with NOT (negative logic)"
    syntax: "NOT node_name within constraint member list"
    scope: |
      Symmetric constraints (ONE/EXCL/INCL): NOT allowed on any member.
      Directional constraints (REQ/MASK): NOT allowed on target side only.
      Source/trigger side is always positive (NOT prohibited).
    examples:
      - "EXCL(A, NOT B) - A and ¬B cannot both be true"
      - "ONE(A, NOT B, C) - Exactly one of {A, ¬B, C} must be true"
      - "INCL(A, NOT B) - At least one of {A, ¬B} must be true"
      - "REQ(A -> NOT B) - If A is true, B must be false"
      # NOT on REQ/MASK source/trigger causes a parse error:
      # REQ(NOT A -> B) → parse error (source must be positive)
      # MASK(NOT A -> {B}) → parse error (trigger must be positive)
    evaluation: "NOT member value is inverted before constraint logic is applied"

  ONE:
    myers_symbol: "O"
    formal_definition: "Exactly one of {A, B, ...} must be true"
    logic: "∑(nodes) = 1"
    logic_with_not: "∑(effective_values) = 1, where NOT members are inverted"
    minimum_nodes: 2
    cardinality: "n-ary (n >= 2)"
    direction: "none (symmetric)"
    example: "ONE(user_input, file_input, api_input)"
    example_with_not: "ONE(enabled, NOT disabled) - exactly one of {enabled, ¬disabled}"
    note: "Stronger than EXCL - forbids all-false case"

  EXCL:
    myers_symbol: "E"
    formal_definition: "At most one of {A, B, ...} can be true (all false is allowed)"
    logic: "∑(nodes) <= 1"
    logic_with_not: "∑(effective_values) <= 1, where NOT members are inverted"
    minimum_nodes: 2
    cardinality: "n-ary (n >= 2)"
    direction: "none (symmetric)"
    example: "EXCL(admin_mode, guest_mode)"
    example_with_not: "EXCL(premium, NOT free_tier) - premium and ¬free_tier cannot both be true"
    note: "Mutual exclusion - allows all-false"

  INCL:
    myers_symbol: "I"
    formal_definition: "At least one of {A, B, ...} must be true"
    logic: "∑(nodes) >= 1"
    logic_with_not: "∑(effective_values) >= 1, where NOT members are inverted"
    minimum_nodes: 2
    cardinality: "n-ary (n >= 2)"
    direction: "none (symmetric)"
    example: "INCL(email_notify, sms_notify)"
    example_with_not: "INCL(active, NOT suspended) - at least one of {active, ¬suspended}"
    note: "OR relationship - forbids all-false"

  REQ:
    myers_symbol: "R"
    formal_definition: "If A is true, then {B, C, ...} must all be true (A → B ∧ C ∧ ...)"
    logic: "A → (B ∧ C ∧ ...) (equivalently: ¬A ∨ (B ∧ C ∧ ...))"
    logic_with_not: "NOT on target only: source → ¬target. Source is always positive."
    minimum_nodes: 2
    cardinality: "1:n (one source, multiple targets)"
    direction: "directional (source → target set)"
    first_connection_rule: "First edge dragged to an empty REQ node becomes the source"
    example: "REQ(premium_user -> {advanced_features, priority_support})"
    example_with_not: "REQ(A -> NOT B) - if A=T then B must be F"
    note: "Implication - targets can be true even if source is false"

  MASK:
    myers_symbol: "M"
    formal_definition: "When A is true, {B, C, ...} become indeterminate (Don't Care)"
    logic: "A=T → {B,C,...}=M"
    logic_with_not: "NOT on target only: trigger → ¬target becomes M. Trigger is always positive."
    minimum_nodes: 2
    cardinality: "1:n (one trigger, multiple targets)"
    direction: "directional (trigger → target set)"
    first_connection_rule: "First edge dragged to an empty MASK node becomes the trigger"
    example: "MASK(offline_mode -> {server_response, latency})"
    example_with_not: "MASK(A -> NOT B) - when A=T, B becomes M (negation is on target reference)"
    note: "Makes target values irrelevant for testing"

# =============================================================================
# Terminology Definitions
# =============================================================================
# Clarification of terms used for decision table column exclusion reasons

terminology:
  column_exclusion_reasons:
    description: "Categories of test conditions that are excluded or marked in decision tables"

    infeasible:
      definition: "A test condition that violates one or more constraints"
      japanese: "実行不可能（制約違反）"
      cause: "Constraint violation (ONE, EXCL, INCL, REQ)"
      examples:
        - constraint: "ONE(A, B)"
          case: "A=T, B=T"
          reason: "Violates ONE constraint (exactly one must be true, but both are true)"
        - constraint: "EXCL(A, B)"
          case: "A=T, B=T"
          reason: "Violates EXCL constraint (at most one can be true)"
        - constraint: "INCL(A, B)"
          case: "A=F, B=F"
          reason: "Violates INCL constraint (at least one must be true)"
        - constraint: "REQ(A -> B)"
          case: "A=T, B=F"
          reason: "Violates REQ constraint (A=T requires B=T)"
      display: "Marked with vertical double lines in coverage table"

    weak:
      definition: "A test condition that is subsumed by another condition (weaker coverage)"
      japanese: "弱いテスト条件（包含される）"
      synonym: "subsumed"
      cause: "Another test condition covers this one (subsumption)"
      examples:
        - scenario: "Condition C1 covers all paths that C2 covers, plus more"
          reason: "C2 is weak (subsumed by C1)"
        - scenario: "Masking causes partial coverage overlap"
          reason: "Less effective condition is marked as weak"
      display: "Hidden in Practice Mode, shown with reason in Learning Mode"

    untestable:
      definition: "A test condition where an effect node has indeterminate (I) value due to MASK"
      japanese: "テスト不可（MASKによる不確定）"
      cause: "MASK constraint causes effect node to become indeterminate"
      explanation: |
        When a MASK trigger is true, masked nodes become M (Don't Care).
        When M propagates through logic, it may become I (Indeterminate).
        If an effect node evaluates to I, we cannot test whether that effect occurs.
      examples:
        - constraint: "MASK(offline -> server_response)"
          case: "offline=T"
          effect: "server_response=M, downstream effect may be I"
          reason: "Cannot test effect when cause path is indeterminate"
      display: "Marked with horizontal double lines in coverage table"

  value_symbols:
    T: "The node is true"
    t: "Must logically be true (no matching combination in expressions)"
    F: "The node is false"
    f: "Must logically be false (no matching combination in expressions)"
    M: "Truth value cannot be determined due to MASK constraint"
    I: "Truth value cannot be determined (cause-side node indeterminate)"

# =============================================================================
# File Format Specifications
# =============================================================================

file_formats:
  dsl:
    extension: ".nceg"
    encoding: "UTF-8 (without BOM)"
    line_ending: "LF (Unix) or CRLF (Windows) - both accepted on import"
    mime_type: "text/plain"
    description: "NeoCEG DSL format for graph definition"

  csv:
    extension: ".csv"
    encoding: "UTF-8 (without BOM)"
    delimiter: ","
    quote_char: '"'
    escape: '""'
    line_ending: "CRLF (for Excel compatibility)"
    header: "required"
    description: "Decision table export format"


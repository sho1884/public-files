  SR-063:
    parent: [UR-001, UR-002]
    category: operation_support
    function: "Auto-layout nodes"
    coordinate_handling:
      with_coordinates: "Place at specified positions"
      without_coordinates: "Auto-layout (no error)"
      partial_coordinates: "Place specified, auto-layout rest"
    layout_algorithm:
      current: "Simple layered layout (prevent overlap)"
      future: "GraphViz MCP integration for hierarchical layout"
    scenarios:
      - context: "DSL import with full coordinates"
        action: "Import"
        outcome: "Place nodes at specified positions"
      - context: "DSL import lacks coordinates"
        action: "Import"
        outcome: "Apply auto-layout (no error)"
      - context: "DSL import with partial coordinates"
        action: "Import"
        outcome: "Place specified nodes, auto-layout others"
      - context: "Graph exists"
        action: "User executes 'Auto-layout'"
        outcome: "Rearrange all nodes"
      - context: "During auto-layout"
        action: "-"
        outcome: "Place causes (in-degree 0) on left, effects (out-degree 0) on right"
      - context: "During auto-layout"
        action: "-"
        outcome: "Ensure minimum spacing so nodes don't overlap"
      - context: "Future enhancement"
        action: "-"
